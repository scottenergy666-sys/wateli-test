<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WATELI | SKU v2</title>
  <meta name="description" content="WATELI SKU v2 product page." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+TC:wght@400;500;700;800&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+TC:wght@400;500;700;800&display=swap" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+TC:wght@400;500;700;800&display=swap"></noscript>
  <link rel="stylesheet" href="assets/css/core/tokens.css" />
  <link rel="stylesheet" href="assets/css/core/base.css" />
  <link rel="stylesheet" href="assets/css/core/layout.css" />
  <link rel="stylesheet" href="assets/css/components/buttons.css" />
  <link rel="stylesheet" href="assets/css/components/sections.css" />
  <style>
    :root {
      --wateli-sku-v2-line: rgba(255,255,255,.16);
      --wateli-sku-v2-text-soft: rgba(255,255,255,.72);
      --wateli-sku-v2-text-faint: rgba(255,255,255,.52);
    }

    body.page-template--sku-v2 {
      color: #f3f6fb;
      background: #0a0f17;
    }

    .wateli-sku-v2 {
      padding: 40px 0 96px;
    }

    .wateli-sku-v2 .container {
      width: min(1280px, calc(100vw - 40px));
    }

    .wateli-sku-v2__section + .wateli-sku-v2__section {
      margin-top: 48px;
    }

    .wateli-sku-v2__core {
  display: grid;
  grid-template-columns: minmax(0, 1.12fr) minmax(320px, .88fr);
  gap: 32px;
  align-items: start;
}

    .wateli-sku-v2__media,
    .wateli-sku-v2__info,
    .wateli-sku-v2__content,
    .wateli-sku-v2__support {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .wateli-sku-v2__info {
      gap: 18px;
    }

    .wateli-sku-v2__hero-copy + .wateli-sku-v2__selector {
  margin-bottom: 24px;
}

    .wateli-sku-v2__selector + .wateli-sku-v2__specs {
      margin-top: 18px;
    }

    .wateli-sku-v2__hero-frame {
      display: block;
      width: 100%;
      aspect-ratio: 4 / 3;
      min-height: 0;
    }

    .wateli-sku-v2__hero-image {
      display: block;
      width: 100%;
      height: auto;
      user-select: none;
      -webkit-user-drag: none;
    }

    .wateli-sku-v2__thumbs {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .wateli-sku-v2__thumb {
      appearance: none;
      border: 1px solid var(--wateli-sku-v2-line);
      background: transparent;
      min-height: 108px;
      padding: 12px;
      cursor: pointer;
      text-align: left;
    }

    .wateli-sku-v2__thumb.is-active {
      border-color: rgba(123,170,255,.72);
    }

    .wateli-sku-v2__thumb img {
      width: 100%;
      height: 64px;
      object-fit: contain;
      display: block;
      margin-bottom: 8px;
    }

    .wateli-sku-v2__thumb-label,
    .wateli-sku-v2__selector-label,
    .wateli-sku-v2__spec-label,
    .wateli-sku-v2__content-block h2,
    .wateli-sku-v2__support-title,
    .wateli-sku-v2__download-meta span {
      display: block;
      font-size: 12px;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: rgba(255,255,255,.46);
    }

    .wateli-sku-v2__hero-copy {
      display: grid;
      gap: 10px;
    }

    .wateli-sku-v2__hero-title {
      margin: 0;
      font-size: clamp(28px, 3.2vw, 44px);
      line-height: 1.06;
      font-weight: 600;
      letter-spacing: .035em;
      color: #fff;
      transition: opacity .18s ease, transform .18s ease;
    }

    .wateli-sku-v2__hero-lead {
  font-size: 15px;
  line-height: 1.7;
  margin-bottom: 24px;
}

    .wateli-sku-v2__selector {
  display: grid;
  gap: 12px;
  margin-bottom: 24px;
}

    .wateli-sku-v2__selector-label {
      display: block;
      font-size: 12px;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: rgba(255,255,255,.54);
    }

    .wateli-sku-v2__capacity-options {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .wateli-sku-v2__capacity-chip {
      appearance: none;
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(255,255,255,.02);
      color: rgba(255,255,255,.82);
      min-height: 42px;
      padding: 0 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border-radius: 999px;
      transition: background-color .18s ease, border-color .18s ease, color .18s ease, transform .18s ease, box-shadow .18s ease;
    }

    .wateli-sku-v2__capacity-chip:hover {
      border-color: rgba(255,255,255,.34);
      background: rgba(255,255,255,.08);
      color: #fff;
      transform: translateY(-1px);
    }

    .wateli-sku-v2__capacity-chip:focus-visible {
      outline: none;
      border-color: rgba(123,170,255,.9);
      box-shadow: 0 0 0 3px rgba(123,170,255,.18);
    }

    .wateli-sku-v2__capacity-chip.is-active {
      border-color: rgba(123,170,255,.88);
      background: rgba(123,170,255,.18);
      color: #fff;
      box-shadow: inset 0 0 0 1px rgba(123,170,255,.2);
    }

    .wateli-sku-v2__specs {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
      align-items: start;
    }

    .wateli-sku-v2__spec {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-top: 14px;
      border-top: 1px solid rgba(255,255,255,.12);
      min-width: 0;
      transition: opacity .18s ease, transform .18s ease;
    }

    .wateli-sku-v2__spec:first-child .wateli-sku-v2__spec-label {
      color: rgba(255,255,255,.62);
    }

    .wateli-sku-v2__spec:first-child .wateli-sku-v2__spec-value {
      font-size: clamp(24px, 2.6vw, 32px);
      line-height: 1.12;
      font-weight: 800;
      letter-spacing: .01em;
    }

    .wateli-sku-v2__spec-value {
      font-size: 20px;
      line-height: 1.3;
      font-weight: 750;
      letter-spacing: .02em;
      white-space: nowrap;
      word-break: normal;
      overflow-wrap: normal;
      transition: opacity .18s ease, transform .18s ease;
    }

    .wateli-sku-v2__value-updated {
      animation: wateliSkuV2Pulse .28s ease;
    }

    @keyframes wateliSkuV2Pulse {
      0% { opacity: .56; transform: translateY(2px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .wateli-sku-v2__spec-item {
      min-width: fit-content;
    }

    .wateli-sku-v2__content {
      gap: 20px;
    }

    .wateli-sku-v2__content-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.06fr) minmax(320px, .94fr);
      gap: 40px;
      align-items: start;
    }

    .wateli-v2__content-column {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .wateli-v2__content-column:first-child .wateli-sku-v2__content-block:nth-child(1) {
      margin-bottom: 14px;
    }

    .wateli-v2__content-column:first-child .wateli-sku-v2__content-block:nth-child(2) {
      margin-bottom: 6px;
    }

    .wateli-sku-v2__content-block {
      padding-top: 14px;
      border-top: 1px solid rgba(255,255,255,.12);
    }

    .wateli-v2__content-column:first-child .wateli-sku-v2__content-block h2,
    .wateli-v2__content-column:last-child .wateli-sku-v2__content-block h2 {
      margin-bottom: 12px;
    }

    .wateli-sku-v2__content-block p,
    .wateli-sku-v2__download-desc {
      margin: 0;
      color: rgba(255,255,255,.64);
      line-height: 1.8;
      font-size: 13px;
    }

    .wateli-sku-v2__content-list,
    .wateli-sku-v2__spec-list {
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .wateli-sku-v2__content-list {
      display: grid;
      gap: 8px;
      color: var(--wateli-sku-v2-text-soft);
      font-size: 14px;
      line-height: 1.7;
    }

    .wateli-sku-v2__spec-list {
      display: grid;
      gap: 14px;
    }

    .wateli-sku-v2__spec-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}

    .wateli-sku-v2__spec-term,
    .wateli-sku-v2__spec-value-text {
      font-size: 14px;
      line-height: 1.72;
    }

    .wateli-sku-v2__spec-term {
      color: var(--wateli-sku-v2-text-faint);
      flex: 0 0 148px;
      min-width: fit-content;
    }

    .wateli-sku-v2__spec-value-text {
      color: rgba(255,255,255,.94);
      flex: 0 0 auto;
      min-width: fit-content;
      text-align: right;
      white-space: nowrap;
      word-break: normal;
      overflow-wrap: normal;
    }

    .wateli-sku-v2__support-list {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 28px;
      align-items: start;
    }

    .wateli-sku-v2__download {
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding-top: 14px;
      border-top: 1px solid rgba(255,255,255,.12);
    }

    .wateli-sku-v2__content-block h2,
    .wateli-sku-v2__download h2 {
      margin: 0 0 10px;
      font-size: 18px;
      line-height: 1.35;
    }

    .wateli-sku-v2__download-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .wateli-sku-v2__support-title {
      margin-bottom: 4px;
    }

    .wateli-sku-v2__download a {
      align-self: flex-start;
      opacity: .88;
      transition: opacity .18s ease, border-color .18s ease, color .18s ease;
    }

    .wateli-sku-v2__download a:hover {
      opacity: 1;
    }

    @media (max-width: 1080px) {
      .wateli-sku-v2__core,
      .wateli-sku-v2__specs,
      .wateli-sku-v2__content-grid,
      .wateli-sku-v2__support-list {
        grid-template-columns: 1fr;
      }

      .wateli-sku-v2__hero-title {
        font-size: 30px;
      }

      .wateli-sku-v2__hero-frame {
        min-height: 0;
      }

      .wateli-sku-v2__spec-term {
        flex-basis: 136px;
      }
    }

    @media (max-width: 720px) {
      .wateli-sku-v2 {
        padding: 24px 0 72px;
      }

      .wateli-sku-v2 .container {
        width: min(100vw - 24px, 1280px);
      }

      .wateli-sku-v2__hero-frame {
        min-height: 0;
      }

      .wateli-sku-v2__thumbs {
        grid-template-columns: 1fr;
      }

      .wateli-sku-v2__spec-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}

      .wateli-sku-v2__spec-term,
      .wateli-sku-v2__spec-value-text {
        font-size: 13px;
      }

      .wateli-sku-v2__spec-term {
        flex-basis: 116px;
      }

      .wateli-sku-v2__support-list {
        gap: 24px;
      }
    }
  
    /* ===== WATELI R20 / SKU V2 MOBILE IMAGE VIEW & SWITCH ONLY =====
       Scope: product-v2 / product-v2-74 mobile image viewing only.
       No SKU data, voltage/capacity logic, product paths, PDI, or desktop refactor.
    */
    .wateli-sku-v2-mobile-viewer[hidden] {
      display: none !important;
    }

    .wateli-sku-v2-mobile-viewer {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      gap: 12px;
      padding: max(18px, env(safe-area-inset-top)) 14px max(18px, env(safe-area-inset-bottom));
      background: rgba(3, 8, 16, .94);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      opacity: 0;
      pointer-events: none;
      transition: opacity .18s ease;
    }

    .wateli-sku-v2-mobile-viewer.is-open {
      opacity: 1;
      pointer-events: auto;
    }

    .wateli-sku-v2-mobile-viewer__top {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      min-height: 42px;
    }

    .wateli-sku-v2-mobile-viewer__close,
    .wateli-sku-v2-mobile-viewer__nav {
      appearance: none;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.06);
      color: rgba(255,255,255,.94);
      cursor: pointer;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.055);
    }

    .wateli-sku-v2-mobile-viewer__close {
      width: 42px;
      height: 42px;
      border-radius: 999px;
      font-size: 22px;
      line-height: 1;
    }

    .wateli-sku-v2-mobile-viewer__stage {
      min-height: 0;
      display: grid;
      place-items: center;
    }

    .wateli-sku-v2-mobile-viewer__image {
      display: block;
      width: auto;
      height: auto;
      max-width: calc(100vw - 28px);
      max-height: min(72vh, 680px);
      object-fit: contain;
      background: transparent;
      user-select: none;
      -webkit-user-drag: none;
    }

    .wateli-sku-v2-mobile-viewer__bottom {
      display: grid;
      gap: 12px;
    }

    .wateli-sku-v2-mobile-viewer__caption {
      min-height: 18px;
      margin: 0;
      color: rgba(230,235,241,.72);
      font-size: 12px;
      line-height: 1.4;
      text-align: center;
    }

    .wateli-sku-v2-mobile-viewer__navs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .wateli-sku-v2-mobile-viewer__nav {
      min-height: 44px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 760;
      letter-spacing: .02em;
    }

    .wateli-sku-v2-mobile-viewer__nav:disabled {
      opacity: .35;
      pointer-events: none;
    }

    body.wateli-sku-v2-viewer-open {
      overflow: hidden;
    }

    @media (min-width: 761px) {
      .wateli-sku-v2-mobile-viewer {
        display: none !important;
      }
    }

    @media (max-width: 760px) {
      .wateli-sku-v2 {
        padding: calc(var(--header-h, 72px) + 14px) 0 58px;
      }

      .wateli-sku-v2 .container {
        width: min(100vw - 24px, 1280px);
      }

      .wateli-sku-v2__core {
        gap: 18px;
      }

      .wateli-sku-v2__media {
        gap: 12px;
      }

      .wateli-sku-v2__hero-frame {
        position: relative;
        border: 1px solid rgba(136,164,208,.18);
        background: rgba(255,255,255,.018);
        cursor: zoom-in;
      }

      .wateli-sku-v2__hero-frame::after {
        content: "VIEW";
        position: absolute;
        right: 10px;
        bottom: 10px;
        min-height: 28px;
        display: inline-flex;
        align-items: center;
        padding: 0 10px;
        border: 1px solid rgba(255,255,255,.16);
        border-radius: 999px;
        background: rgba(4,10,20,.56);
        color: rgba(255,255,255,.78);
        font-size: 10px;
        font-weight: 800;
        letter-spacing: .1em;
        pointer-events: none;
      }

      .wateli-sku-v2__hero-image {
        cursor: zoom-in;
      }

      .wateli-sku-v2__thumbs {
        display: flex;
        grid-template-columns: none;
        gap: 8px;
        overflow-x: auto;
        overflow-y: hidden;
        padding: 0 1px 4px;
        scroll-snap-type: x proximity;
        overscroll-behavior-x: contain;
        -webkit-overflow-scrolling: touch;
      }

      .wateli-sku-v2__thumbs::-webkit-scrollbar {
        display: none;
      }

      .wateli-sku-v2__thumb {
        flex: 0 0 132px;
        min-height: 94px;
        padding: 8px;
        border-radius: 12px;
        scroll-snap-align: start;
        background: rgba(255,255,255,.018);
      }

      .wateli-sku-v2__thumb.is-active {
        border-color: rgba(123,170,255,.84);
        background: rgba(123,170,255,.08);
      }

      .wateli-sku-v2__thumb img {
        height: 54px;
        margin-bottom: 6px;
      }

      .wateli-sku-v2__thumb-label {
        font-size: 11px;
        line-height: 1.25;
      }

      .wateli-sku-v2__hero-title {
        font-size: clamp(28px, 9.5vw, 38px);
      }

      .wateli-sku-v2__hero-lead {
        margin-bottom: 14px;
      }
    }

    @media (max-width: 390px) {
      .wateli-sku-v2-mobile-viewer__image {
        max-height: 68vh;
      }

      .wateli-sku-v2__thumb {
        flex-basis: 118px;
      }
    }

  
    /* ===== WATELI R20B / SKU MOBILE CENTER + PAGE BACK FIX =====
       Scope: product-v2 / product-v2-74 mobile-only visual/return behavior.
       Fixes:
       1. mobile viewer image centering
       2. mobile SKU page close/back affordance
       No SKU data, product path, capacity/voltage logic, or PDI restructuring.
    */
    .wateli-sku-v2__mobile-close {
      display: none;
    }

    @media (max-width: 760px) {
      .wateli-sku-v2-mobile-viewer {
        align-items: stretch;
        justify-items: stretch;
      }

      .wateli-sku-v2-mobile-viewer__stage {
        width: 100%;
        height: 100%;
        min-width: 0;
        min-height: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .wateli-sku-v2-mobile-viewer__image {
        margin: auto;
        object-fit: contain;
      }

      .wateli-sku-v2__mobile-close {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        align-self: flex-start;
        width: auto;
        max-width: 100%;
        min-height: 38px;
        margin: 0 0 14px;
        padding: 0 14px;
        border: 1px solid rgba(136,164,208,.18);
        border-radius: 999px;
        background: rgba(255,255,255,.035);
        color: rgba(232,240,255,.82);
        font-size: 13px;
        font-weight: 760;
        line-height: 1;
        letter-spacing: .02em;
        text-decoration: none;
        white-space: nowrap;
        cursor: pointer;
        box-shadow: inset 0 1px 0 rgba(255,255,255,.045);
      }

      .wateli-sku-v2__mobile-close::before {
        content: '‹';
        display: inline-block;
        margin-right: 7px;
        font-size: 19px;
        line-height: 1;
        transform: translateY(-1px);
      }

      .wateli-sku-v2__mobile-close:hover,
      .wateli-sku-v2__mobile-close:focus-visible {
        color: #fff;
        border-color: rgba(255,255,255,.22);
        outline: none;
      }
    }

  
    /* ===== WATELI R20C / SKU MOBILE HERO CENTER + MAGNIFIER HINT FIX =====
       Scope: product-v2 / product-v2-74 mobile image affordance only.
       Fixes:
       1. visual centering of mobile hero image
       2. replace heavy VIEW label with restrained magnifier hint
       No SKU data, product paths, capacity/voltage logic, PDI, or desktop refactor.
    */
    @media (max-width: 760px) {
      .wateli-sku-v2__hero-frame {
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
        width: 100% !important;
        max-width: 100% !important;
        overflow: hidden !important;
        box-sizing: border-box !important;
      }

      .wateli-sku-v2__hero-image {
        display: block !important;
        width: auto !important;
        max-width: 100% !important;
        height: auto !important;
        max-height: 100% !important;
        margin-inline: auto !important;
        object-fit: contain !important;
        object-position: center center !important;
      }

      .wateli-sku-v2__hero-frame::after {
        content: "⌕" !important;
        right: 10px !important;
        bottom: 10px !important;
        width: 34px !important;
        height: 34px !important;
        min-height: 0 !important;
        padding: 0 !important;
        display: inline-flex !important;
        align-items: center !important;
        justify-content: center !important;
        border: 1px solid rgba(255,255,255,.24) !important;
        border-radius: 999px !important;
        background:
          linear-gradient(180deg, rgba(255,255,255,.14), rgba(255,255,255,.065)),
          rgba(5,12,22,.72) !important;
        color: rgba(255,255,255,.92) !important;
        font-size: 20px !important;
        font-weight: 800 !important;
        letter-spacing: 0 !important;
        line-height: 1 !important;
        box-shadow:
          0 10px 24px rgba(0,0,0,.24),
          inset 0 1px 0 rgba(255,255,255,.16) !important;
        pointer-events: none !important;
      }

      .wateli-sku-v2-mobile-viewer__stage {
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
      }

      .wateli-sku-v2-mobile-viewer__image {
        margin: auto !important;

          ],

    };

    (function () {
      const page = window.WATELI_SKU_V2_PAGE;
      if (!page) return;

      const heroImg = document.getElementById('wateli-sku-v2-hero-image');
      const thumbsRoot = document.getElementById('wateli-sku-v2-thumbs');
      const capacityRoot = document.getElementById('wateli-sku-v2-capacity-options');
      const supportRoot = document.getElementById('wateli-sku-v2-support-list');
      const selectorWrap = document.querySelector('.wateli-sku-v2__selector');

      const state = {
        product: null,
        variants: [],
        specMap: [],
        rules: {},
        activeSkuId: '',
        activeImageKey: 'hero',
        ready: false
      };


      /* ===== WATELI R20 / SKU V2 MOBILE IMAGE VIEW & SWITCH ONLY ===== */
      const mobileImageViewer = {
        root: null,
        img: null,
        caption: null,
        prev: null,
        next: null,
        close: null,
        active: false
      };

      function isMobileImageMode() {
        return window.matchMedia ? window.matchMedia('(max-width: 760px)').matches : window.innerWidth <= 760;
      }

      function getCurrentVariant() {
        return (state.variants || []).find((variant) => variant.sku_id === state.activeSkuId) || state.variants?.[0] || null;
      }

      function ensureMobileImageViewer() {
        if (mobileImageViewer.root) return mobileImageViewer.root;

        const root = document.createElement('div');
        root.className = 'wateli-sku-v2-mobile-viewer';
        root.hidden = true;
        root.setAttribute('role', 'dialog');
        root.setAttribute('aria-modal', 'true');
        root.setAttribute('aria-label', 'Product image viewer');
        root.innerHTML = `
          <div class="wateli-sku-v2-mobile-viewer__top">
            <button type="button" class="wateli-sku-v2-mobile-viewer__close" aria-label="Close image viewer">×</button>
          </div>
          <div class="wateli-sku-v2-mobile-viewer__stage">
            <img class="wateli-sku-v2-mobile-viewer__image" alt="">
          </div>
          <div class="wateli-sku-v2-mobile-viewer__bottom">
            <p class="wateli-sku-v2-mobile-viewer__caption"></p>
            <div class="wateli-sku-v2-mobile-viewer__navs">
              <button type="button" class="wateli-sku-v2-mobile-viewer__nav wateli-sku-v2-mobile-viewer__prev" aria-label="Previous image">Prev</button>
              <button type="button" class="wateli-sku-v2-mobile-viewer__nav wateli-sku-v2-mobile-viewer__next" aria-label="Next image">Next</button>
            </div>
          </div>
        `;

        document.body.appendChild(root);
        mobileImageViewer.root = root;
        mobileImageViewer.img = root.querySelector('.wateli-sku-v2-mobile-viewer__image');
        mobileImageViewer.caption = root.querySelector('.wateli-sku-v2-mobile-viewer__caption');
        mobileImageViewer.close = root.querySelector('.wateli-sku-v2-mobile-viewer__close');
        mobileImageViewer.prev = root.querySelector('.wateli-sku-v2-mobile-viewer__prev');
        mobileImageViewer.next = root.querySelector('.wateli-sku-v2-mobile-viewer__next');

        mobileImageViewer.close?.addEventListener('click', closeMobileImageViewer);
        mobileImageViewer.prev?.addEventListener('click', () => moveMobileImage(-1));
        mobileImageViewer.next?.addEventListener('click', () => moveMobileImage(1));
        root.addEventListener('click', (event) => {
          if (event.target === root) closeMobileImageViewer();
        });
        document.addEventListener('keydown', (event) => {
          if (!mobileImageViewer.active) return;
          if (event.key === 'Escape') closeMobileImageViewer();
          if (event.key === 'ArrowLeft') moveMobileImage(-1);
          if (event.key === 'ArrowRight') moveMobileImage(1);
        });

        return root;
      }

      function syncMobileImageViewer() {
        if (!mobileImageViewer.active || !mobileImageViewer.img) return;

        const src = heroImg?.currentSrc || heroImg?.src || '';
        if (src) {
          mobileImageViewer.img.src = src;
          mobileImageViewer.img.alt = heroImg?.alt || '';
        }

        const current = getCurrentVariant();
        const images = current ? getVariantImages(current) : [];
        const canSwitch = images.length > 1;

        if (mobileImageViewer.caption) {
          const label = heroImg?.alt || '';
          mobileImageViewer.caption.textContent = label;
        }

        if (mobileImageViewer.prev) mobileImageViewer.prev.disabled = !canSwitch;
        if (mobileImageViewer.next) mobileImageViewer.next.disabled = !canSwitch;
      }

      function openMobileImageViewer() {
        if (!isMobileImageMode() || !heroImg || !(heroImg.currentSrc || heroImg.src)) return;

        ensureMobileImageViewer();
        mobileImageViewer.active = true;
        mobileImageViewer.root.hidden = false;
        document.body.classList.add('wateli-sku-v2-viewer-open');
        syncMobileImageViewer();
        requestAnimationFrame(() => {
          mobileImageViewer.root.classList.add('is-open');
          mobileImageViewer.close?.focus?.();
        });
      }

      function closeMobileImageViewer() {
        if (!mobileImageViewer.root) return;
        mobileImageViewer.active = false;
        mobileImageViewer.root.classList.remove('is-open');
        document.body.classList.remove('wateli-sku-v2-viewer-open');
        window.setTimeout(() => {
          if (!mobileImageViewer.active && mobileImageViewer.root) {
            mobileImageViewer.root.hidden = true;
          }
        }, 180);
        heroImg?.focus?.();
      }

      function moveMobileImage(direction) {
        const current = getCurrentVariant();
        if (!current) return;
        const images = getVariantImages(current);
        if (images.length < 2) return;

        const currentIndex = Math.max(0, images.findIndex((image) => image.key === state.activeImageKey));
        const nextIndex = (currentIndex + direction + images.length) % images.length;
        state.activeImageKey = images[nextIndex].key;
        renderHeroImage(current);
        renderThumbs(getCopy(), current);
      }

      function prepareMobileHeroAccess() {
        if (!heroImg) return;
        heroImg.setAttribute('role', 'button');
        heroImg.setAttribute('tabindex', '0');
        heroImg.setAttribute('aria-label', 'Open product image viewer');
        heroImg.addEventListener('click', openMobileImageViewer);
        heroImg.addEventListener('keydown', (event) => {
          if (event.key !== 'Enter' && event.key !== ' ') return;
          event.preventDefault();
          openMobileImageViewer();
        });
        heroImg.addEventListener('load', syncMobileImageViewer);
        window.addEventListener('resize', () => {
          if (mobileImageViewer.active && !isMobileImageMode()) closeMobileImageViewer();
        });
      }

      prepareMobileHeroAccess();


      /* ===== WATELI R20B / SKU MOBILE CENTER + PAGE BACK FIX ===== */
      function getSkuReturnTarget() {
        const params = new URLSearchParams(window.location.search);
        const from = params.get('from') || params.get('source') || '';
        const allowed = [
          'products-block.html',
          'products-slim.html',
          'products-split.html',
          'products-stick.html',
          'products-twin.html',
          'products.html'
        ];

        if (allowed.includes(from)) return from;

        try {
          const ref = document.referrer ? new URL(document.referrer, window.location.href) : null;
          const file = ref ? ref.pathname.split('/').pop() : '';
          if (allowed.includes(file)) return file;
        } catch (error) {}

        return 'products.html';
      }

      function getSkuMobileBackLabel() {
        return getLang() === 'zh' ? '返回產品選擇' : 'Back to Products';
      }

      function updateSkuMobileBackControlLabel() {
        const button = document.querySelector('.wateli-sku-v2__mobile-close');
        if (!button) return;
        button.textContent = getSkuMobileBackLabel();
      }

      function prepareSkuMobileBackControl() {
        const root = document.querySelector('.wateli-sku-v2 .container');
        if (!root || document.querySelector('.wateli-sku-v2__mobile-close')) return;

        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'wateli-sku-v2__mobile-close';
        button.setAttribute('data-wateli-sku-mobile-back', '1');
        button.addEventListener('click', () => {
          const target = getSkuReturnTarget();
          window.location.href = target;
        });

        root.insertBefore(button, root.firstElementChild);
        updateSkuMobileBackControlLabel();
      }

      prepareSkuMobileBackControl();



      function getLang() {
        return window.WATELI?.utils?.getStoredLang?.() || (document.documentElement.lang === 'zh-Hant' ? 'zh' : 'en');
      }

      function getCopy() {
        const lang = getLang();
        return page.copy[lang] || page.copy.en;
      }

      function setText(id, value) {
        const el = document.getElementById(id);
        if (el) el.textContent = value ?? '';
      }

      function renderList(id, items) {
        const el = document.getElementById(id);
        if (!el) return;
        el.innerHTML = '';
        (items || []).forEach((item) => {
          if (!item) return;
          const li = document.createElement('li');
          li.textContent = item;
          el.appendChild(li);
        });
      }

      function getSpecEntry(key) {
        return (state.specMap || []).find((item) => item.key === key) || null;
      }

      function getSpecUnit(key) {
        const entry = getSpecEntry(key);
        return entry ? (entry.unit ?? '') : '';
      }

      function getSpecLabel(key) {
        const entry = getSpecEntry(key);
        const copy = getCopy();
        const override = copy?.specLabelOverrides?.[key];
        if (override) return override;
        if (!entry) return '';
        return getLang() === 'zh' ? (entry.label_zh ?? '') : (entry.label_en ?? '');
      }

      function toTitleCase(value) {
        return String(value || '')
          .replace(/[_-]+/g, ' ')
          .replace(/\w/g, (char) => char.toUpperCase())
          .trim();
      }

      function getSeriesDisplayName(seriesKey, lang) {
        const normalized = String(seriesKey || '').trim().toLowerCase();
        const seriesLabels = {
          twin: { zh: '雙聯', en: 'Twin' },
          slim: { zh: '薄型', en: 'Slim' },
          block: { zh: '方塊', en: 'Block' },
          split: { zh: '分離', en: 'Split' },
          stick: { zh: '棒型', en: 'Stick' }
        };
        const matched = seriesLabels[normalized];
        if (matched) return matched[lang] || matched.en;
        return toTitleCase(normalized || seriesKey || '');
      }


      function formatSkuDisplay(raw) {
        if (!raw) return '';

        let s = String(raw).trim().toUpperCase();
        s = s.replace(/_/g, '-');
        s = s.replace(/^SLIM-/, 'SL-');
        s = s.replace(/^TWIN-/, 'TW-');
        s = s.replace(/^BLOCK-/, 'BL-');
        s = s.replace(/^SPLIT-/, 'SP-');
        s = s.replace(/^STICK-/, 'ST-');
        return s;

      function renderSkuDisplay(current) {
        const value = formatSkuDisplay(current?.sku_id || current?.model || current?.name || '');

          'wateli-sku-v2-model',

          'wateli-sku-v2-hero-sku'

          const el = document.getElementById(id);

      function getFallbackDisplayTitle(current, product) {
        if (!current) return '';

        const lang = getLang();
        const seriesKey = product?.series || current?.series || '';
        const seriesLabel = getSeriesDisplayName(seriesKey, lang);
        const voltageText = formatValue(current?.voltage, getSpecUnit('voltage'));
        const capacityText = formatValue(current?.capacity, getSpecUnit('capacity'));

        if (lang === 'zh') {
          return [seriesLabel, '系列', voltageText, capacityText].filter(Boolean).join(' ');
        }

        return [seriesLabel, voltageText, capacityText].filter(Boolean).join(' ');
      }

      function getDisplayTitle(current, product) {
        if (!current) return '';

        const candidates = [
          current.display_name,
          current.title,
          current.name,
          current.model,
          product?.display_name,
          product?.title,
          product?.name,
          product?.model
        ];
        const explicit = candidates.find((value) => typeof value === 'string' && value.trim());
        if (explicit) return explicit.trim();

        return getFallbackDisplayTitle(current, product);
      }

      function getHeroVoltageText(current) {
        if (current?.voltage === null || current?.voltage === undefined || current?.voltage === '') return '';
        const voltageText = formatValue(current?.voltage, getSpecUnit('voltage'));
        const chemistryText = getCopy()?.batteryChemistry || '';
        return [voltageText, chemistryText].filter(Boolean).join(' ');
      }

      function formatValue(value, unit) {
        if (value === undefined || value === null || value === '') return '';
        return unit ? `${value}${unit}` : String(value);
      }

      const detailImageResolveCache = new Map();
      let detailHeroRenderToken = 0;

      function resolveDetailImage(src) {
        const raw = typeof src === 'string' ? src.trim() : '';
        if (!raw) return Promise.resolve('');
        if (detailImageResolveCache.has(raw)) return detailImageResolveCache.get(raw);

        const base = raw.replace(/\/hero\.(?:jpe?g|png|webp)$/i, '/hero');
        const candidates = ['jpg', 'png', 'webp'].map((ext) => `${base}.${ext}`);

        const promise = new Promise((resolve) => {
          let index = 0;
          const probe = new Image();

          const tryNext = () => {
            if (index >= candidates.length) {
              resolve('');
              return;
            }

            const nextSrc = candidates[index++];
            probe.onload = () => resolve(nextSrc);
            probe.onerror = tryNext;
            probe.src = nextSrc;
          };

          tryNext();
        });

        detailImageResolveCache.set(raw, promise);
        return promise;
      }

      function getVariantImages(variant) {
        if (!variant) return [];
        return [
          { key: 'hero', src: variant.hero_image, thumb: variant.hero_image },
          { key: 'sku_1', src: variant.sku_1_image, thumb: variant.sku_1_image },
          { key: 'sku_2', src: variant.sku_2_image, thumb: variant.sku_2_image }
        ].filter((image) => image.src && image.thumb);
      }

      function formatSpecDisplayValue(value, unit) {
        if (value === undefined || value === null || value === '') return '';
        const text = String(value).trim();
        if (!unit) return text;
        if (/([a-zA-Z%]|\/)$/u.test(text) || text.toLowerCase().endsWith(String(unit).toLowerCase())) {
          return text;
        }
        return `${text}${unit}`;
      }

      function getExcelDrivenSpecRows(targetId, current) {
        if (current?.key_id !== 'twin_111_2000') return null;

        const rows = [];
        const isGeneral = String(targetId || '').includes('general');
        const pushRow = (label, value) => {
          if (!label || value === undefined || value === null || value === '') return;
          rows.push({ label, text: String(value) });
        };

        if (isGeneral) {
          pushRow(getSpecLabel('voltage'), formatSpecDisplayValue(current?.voltage, getSpecUnit('voltage') || 'V'));
          pushRow(getSpecLabel('capacity'), formatSpecDisplayValue(current?.capacity, getSpecUnit('capacity') || 'mAh'));
          return rows;
        }

        const size = current?.length !== undefined && current?.length !== null && current?.length !== '' &&
          current?.width !== undefined && current?.width !== null && current?.width !== '' &&
          current?.height !== undefined && current?.height !== null && current?.height !== ''
            ? `${current.length} x ${current.width} x ${current.height} ${current.dimension_unit || 'cm'}`
            : '';

        pushRow(getSpecLabel('battery_type'), current?.battery_type || '');
        pushRow(getSpecLabel('connector'), current?.connector || '');
        pushRow(getSpecLabel('discharge_rate'), current?.discharge_rate || '');
        pushRow(getSpecLabel('dimension'), size);
        return rows;
      }

      function renderSpecList(targetId, current, specMap) {
        const el = document.getElementById(targetId);
        if (!el) return;
        el.innerHTML = '';

        const excelRows = getExcelDrivenSpecRows(targetId, current);
        if (excelRows) {
          excelRows.forEach((item) => {
            const row = document.createElement('div');
            row.className = 'wateli-sku-v2__spec-row';
            row.innerHTML = `
              <dt class="wateli-sku-v2__spec-term">${item.label}</dt>
              <dd class="wateli-sku-v2__spec-value-text" style="margin:0">${item.text}</dd>
            `;
            el.appendChild(row);
          });
          return;
        }

        const generalKeys = ['voltage', 'capacity'];
        const batteryKeys = ['battery_type', 'connector', 'discharge_rate', 'dimension'];
        const allowedKeys = String(targetId || '').includes('general') ? generalKeys : batteryKeys;
        const size = current?.length !== undefined && current?.length !== null && current?.length !== '' &&
          current?.width !== undefined && current?.width !== null && current?.width !== '' &&
          current?.height !== undefined && current?.height !== null && current?.height !== ''
            ? `${current.length} x ${current.width} x ${current.height} ${current.dimension_unit || 'cm'}`
            : '';

        const filteredSpecMap = (specMap || []).filter((item) => allowedKeys.includes(item.key));
        filteredSpecMap.forEach((item) => {
          const value = item.key === 'dimension' ? size : current?.[item.key];
          if (value === null || value === undefined || value === '') return;

          const text = item.key === 'dimension' ? String(value) : (item.unit ? `${value}${item.unit}` : `${value}`);
          const label = getLang() === 'zh' ? (item.label_zh ?? '') : (item.label_en ?? '');
          if (!label) return;

          const row = document.createElement('div');
          row.className = 'wateli-sku-v2__spec-row';
          row.innerHTML = `
            <dt class="wateli-sku-v2__spec-term">${label}</dt>
            <dd class="wateli-sku-v2__spec-value-text" style="margin:0">${text}</dd>
          `;
          el.appendChild(row);
        });
      }

      function renderSupport(copy) {
        if (!supportRoot) return;
        supportRoot.innerHTML = '';
        (copy.downloads || []).forEach((item) => {
          const article = document.createElement('article');
          article.className = 'wateli-sku-v2__download';
          article.innerHTML = `

            <a class="btn btn-secondary" href="${item.href}">${item.cta}</a>
          `;
          supportRoot.appendChild(article);
        });
      }

      function hideSelector() {
        if (selectorWrap) selectorWrap.style.display = 'none';
      }

      function renderSelector(capacities, variants) {
        if (!capacityRoot) return;
        capacityRoot.innerHTML = '';
        setText('wateli-sku-v2-capacity-label', `${getCopy().capacityLabel}`);

        variants.forEach((variant, index) => {
          const capacity = capacities[index];
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'wateli-sku-v2__capacity-chip' + (variant.sku_id === state.activeSkuId ? ' is-active' : '');
          btn.textContent = formatValue(capacity, getSpecUnit('capacity'));
          btn.setAttribute('aria-label', `Select ${formatValue(capacity, getSpecUnit('capacity'))}`);
          btn.setAttribute('aria-pressed', variant.sku_id === state.activeSkuId ? 'true' : 'false');
          btn.addEventListener('click', () => selectSKU(variant.sku_id, state.variants, state.specMap));
          capacityRoot.appendChild(btn);
        });

        if (selectorWrap) selectorWrap.style.display = '';
      }

      function renderThumbs(copy, current) {
        if (!thumbsRoot) return;
        thumbsRoot.innerHTML = '';
        const images = getVariantImages(current);
        thumbsRoot.style.display = images.length ? '' : 'none';

        images.forEach((image) => {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'wateli-sku-v2__thumb' + (image.key === state.activeImageKey ? ' is-active' : '');
          btn.setAttribute('aria-pressed', image.key === state.activeImageKey ? 'true' : 'false');
          btn.innerHTML = `
            <img src="${image.thumb}" alt="${copy.imageAlt(current, copy.imageLabels[image.key] || image.key)}">
            <span class="wateli-sku-v2__thumb-label">${copy.imageLabels[image.key] || image.key}</span>
          `;
          if (image.key === 'hero') {
            const thumbImg = btn.querySelector('img');
            if (thumbImg) {
              thumbImg.removeAttribute('src');
              resolveDetailImage(image.thumb).then((resolvedSrc) => {
                if (!thumbsRoot.contains(btn)) return;
                if (resolvedSrc) {
                  thumbImg.src = resolvedSrc;
                } else {
                  thumbImg.removeAttribute('src');
                }
              });
            }
          }
          btn.addEventListener('click', () => {
            state.activeImageKey = image.key;
            renderHeroImage(current);
            renderThumbs(getCopy(), current);
          });
          thumbsRoot.appendChild(btn);
        });
      }

      function renderHeroImage(current) {
        if (!heroImg) return;
        const images = getVariantImages(current);
        const activeImage = images.find((image) => image.key === state.activeImageKey) || images[0];
        detailHeroRenderToken += 1;
        const renderToken = detailHeroRenderToken;

        if (!activeImage?.src) {
          heroImg.removeAttribute('src');
          heroImg.alt = '';
          return;
        }

        const copy = getCopy();
        const altText = copy.imageAlt(current, copy.imageLabels[activeImage.key] || activeImage.key);

        if (activeImage.key !== 'hero') {
          heroImg.src = activeImage.src;
          heroImg.alt = altText;
          return;
        }

        heroImg.removeAttribute('src');
        heroImg.alt = '';

        resolveDetailImage(activeImage.src).then((resolvedSrc) => {
          if (renderToken !== detailHeroRenderToken) return;
          if (!resolvedSrc) {
            heroImg.removeAttribute('src');
            heroImg.alt = '';
            return;
          }
          heroImg.src = resolvedSrc;
          heroImg.alt = altText;
        });
      }

        const copy = getCopy();

        renderLead(product?.lead?.[getLang()] || '');
        renderProductContent(product);

        if (!variants || variants.length === 0) {

          hideSelector();
          return;

        renderSelector(variants.map((variant) => variant.capacity), variants);

          hideSelector();

        const current = (variants || []).find((variant) => variant.sku_id === sku_id);

        state.activeImageKey = 'hero';

          history.replaceState(null, '', `${url.pathname}?${url.searchParams.toString()}`);

        const displayTitle = getDisplayTitle(current, state.product);
        const heroTitle = formatSkuDisplay(current?.model || current?.sku_id || current?.key_id || '');

        renderHeroSpec(current);
        renderSpecList('wateli-sku-v2-general-spec-list', current, specMap);

        renderHeroImage(current);
        renderThumbs(getCopy(), current);
        renderSelector((variants || []).map((variant) => variant.capacity), variants);
        pulseUpdatedFields();

        document.title = `${getCopy().metaTitle} | ${displayTitle || current.key_id || current.sku_id}`;

      function getRequestedKeyId() {
        const params = new URLSearchParams(window.location.search);
        return (params.get('key_id') || '').trim();
      }

      function getSeriesFromKeyId(keyId) {
        if (!keyId) return '';
        return String(keyId).split('_')[0] || '';
      }

      function normalizeVariantFromKeyId(variant) {
        if (!variant) return variant;
        const keyId = (variant.key_id || variant.sku_id || '').trim();
        const series = getSeriesFromKeyId(keyId);
        if (!keyId || !series) return variant;

        return {
          ...variant,
          sku_id: variant.sku_id || keyId,
          key_id: keyId,
          product_id: series,
          series,
          hero_image: variant.hero_image,
          sku_1_image: `./assets/images/products/${series}/${keyId}/sku-1.png`,
          sku_2_image: `./assets/images/products/${series}/${keyId}/sku-2.png`
        };
      }

      function resolveRequestedVariant(requestedKeyId, skuList) {
        if (!requestedKeyId) return null;

        return (skuList || []).find((variant) => {
          const normalized = normalizeVariantFromKeyId(variant);
          return normalized?.key_id === requestedKeyId;
        }) || null;
      }

      function resolveCurrentProduct(requestedKeyId, products, skuList) {
        const series = getSeriesFromKeyId(requestedKeyId);
        if (!series || !products?.[series]) return '';

        const matchedVariant = resolveRequestedVariant(requestedKeyId, skuList);
        if (!matchedVariant) return '';

        const normalized = normalizeVariantFromKeyId(matchedVariant);
        const resolvedProductId = (normalized?.product_id || series || '').trim();

        return products?.[resolvedProductId] ? resolvedProductId : '';
      }

      function clearDynamicContent() {
        renderTitle('');
        renderLead('');
        setText('wateli-sku-v2-description-body', '');
        renderHeroImage(null);
        renderList('wateli-sku-v2-features-list', []);
        renderList('wateli-sku-v2-package-list', []);
        renderList('wateli-sku-v2-special-notes-list', []);
        renderList('wateli-sku-v2-safety-notes-list', []);
        renderSpecList('wateli-sku-v2-general-spec-list', {}, []);
        renderSpecList('wateli-sku-v2-battery-spec-list', {}, []);
        selectorRoot?.classList.add('is-hidden');
      }

      function applyLoadedData(products, skuList, specMapRaw, rules) {
        const requestedKeyId = getRequestedKeyId();
        const normalizedSkuList = (skuList || []).map(normalizeVariantFromKeyId);
        const requestedVariant = resolveRequestedVariant(requestedKeyId, normalizedSkuList);
        const currentProductId = resolveCurrentProduct(requestedKeyId, products, normalizedSkuList);
        const product = currentProductId ? products?.[currentProductId] : null;
        const currentVoltage = Number(page.CURRENT_VOLTAGE);
        const variants = currentProductId
          ? normalizedSkuList.filter((variant) => (
              variant.product_id === currentProductId &&
              Number(variant.voltage) === currentVoltage
            ))
          : [];
        const specMap = (specMapRaw || [])
          .filter((item) => item.visible === true || item.visible === 'true' || item.visible === 1 || item.visible === '1')
          .sort((a, b) => Number(a.order) - Number(b.order));

        state.product = product ?? null;
        state.variants = variants;
        state.specMap = specMap;
        state.rules = rules ?? {};
        state.activeSkuId = requestedVariant && variants.some((variant) => variant.sku_id === requestedVariant.sku_id)
          ? requestedVariant.sku_id
          : '';
        state.ready = true;

        renderStaticContent(getCopy());

        if (!requestedKeyId || !currentProductId || !product || state.activeSkuId === '') {
          clearDynamicContent();
          return;
        }

        initPage(state.product, state.variants, state.specMap, state.rules);
      }

      function loadData() {
        const local = window.__WATELI_EMBEDDED_DATA__;
        if (!local) {
          console.error('WATELI SKU v2 embedded data missing.');
          return Promise.resolve();
        }

        applyLoadedData(local.products, local.skuList, local.specMapRaw, local.rules);
        return Promise.resolve();
      }

      function render() {
        if (!state.ready) return;
        const current = state.variants.find((variant) => variant.sku_id === state.activeSkuId) || state.variants[0];
        if (!current) return;
        renderStaticContent(getCopy());
        updateSkuMobileBackControlLabel();
        renderLead(state.product?.lead?.[getLang()] || '');
        renderProductContent(state.product);
        selectSKU(current.sku_id, state.variants, state.specMap);

        if (state.variants.length < 2) {
          hideSelector();
        }
      }

      document.addEventListener('DOMContentLoaded', loadData, { once: true });
      document.addEventListener('wateli:layout-ready', render);
      window.addEventListener('storage', render);
      document.addEventListener('click', (event) => {
        const btn = event.target.closest('[data-lang-btn]');
        if (!btn) return;
        setTimeout(() => {
          updateSkuMobileBackControlLabel();
          render();
        }, 10);
      });

      window.selectSKU = (sku_id) => selectSKU(sku_id, state.variants, state.specMap);
    })();
  </script>
