  <script>
    (function () {
      var mq = window.matchMedia('(min-width: 769px)');
      var hero = document.querySelector('.home-desktop-hero');
      if (!hero) return;

      var slides = Array.prototype.slice.call(hero.querySelectorAll('.home-hero__slide'));
      var dots = Array.prototype.slice.call(hero.querySelectorAll('[data-home-hero-dot]'));
      if (slides.length < 2) return;

      var i = 0;
      var timer = null;
      var interval = 4000;

      function show(index) {
        i = index;
        slides.forEach(function (slide, n) {
          slide.classList.toggle('is-active', n === index);
        });

        dots.forEach(function (dot, n) {
          var active = n === index;
          dot.classList.toggle('is-active', active);
          dot.setAttribute('aria-current', active ? 'true' : 'false');
        });
      }

      function start() {
        if (timer) {
          window.clearInterval(timer);
        }

        timer = window.setInterval(function () {
          if (!mq.matches) {
            show(0);
            return;
          }

          show((i + 1) % slides.length);
        }, interval);
      }

      dots.forEach(function (dot, index) {
        dot.addEventListener('click', function () {
          show(index);
          start();
        });
      });

      show(0);
      start();
    })();
  </script>
